<!DOCTYPE html>
<html>
<head>
    <title>Automation Test Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
         font-family: Arial;
         background: white;   /* 🔥 FULL SCREEN WHITE */
         margin: 0;
         padding: 0;
         text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        /* 🔥 CENTER + SMALL DASHBOARD */
        .container {
          width: 65%;
          max-width: 850px;
          margin: 30px auto;
          background: transparent;   /* ✅ no second white layer */
          padding: 20px;
        }

        /* CARDS CENTER */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            width: 500px;
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
        }

        /* 🔥 STACK CHARTS VERTICALLY */
        .chart-box {
            width: 70%;
            margin: 25px auto;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
         /* ✅ UPDATED HERE (smaller pie chart) */
        #pieChart {
            width: 300px !important;
            height: 300px !important;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            max-width: 300px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        /* TABLE CENTER + SMALL */
        table {
            width: 85%;
            margin: 20px auto;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: black;
            color: white;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Automation Test Dashboard</h1>

<div class="container">

    <!-- Buttons -->
    <div class="controls">
        <button onclick="runTests()">Run Tests</button>
        <button onclick="loadData()">Refresh</button>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total</h3>
            <h2 id="total">0</h2>
        </div>
        <div class="card">
            <h3>Passed</h3>
            <h2 id="pass">0</h2>
        </div>
        <div class="card">
            <h3>Failed</h3>
            <h2 id="fail">0</h2>
        </div>
    </div>

    <!-- 🔥 PIE CHART -->
    <div class="chart-box">
        <h3>Test Results</h3>
        <canvas id="pieChart" width="70" height="70"></canvas>
    </div>

    <!-- 🔥 BAR CHART -->
    <div class="chart-box">
        <h3>Execution Time</h3>
        <canvas id="barChart"></canvas>
    </div>

    <!-- Search -->
    <div class="controls">
        <input type="text" id="search" placeholder="Search..." onkeyup="filterData()">
        <br>
        <button onclick="filterStatus('ALL')">All</button>
        <button onclick="filterStatus('PASS')">Passed</button>
        <button onclick="filterStatus('FAIL')">Failed</button>
    </div>

    <!-- Table -->
    <table>
        <thead>
        <tr>
            <th>Test Name</th>
            <th>Status</th>
            <th>Execution Time</th>
            <th>Screenshot</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>

    let allData = [];
    let pieChart, barChart;

    function runTests() {
        fetch('/run/runAll', { method: 'POST' })
            .then(() => setTimeout(loadData, 2000));
    }

    function loadData() {
        fetch('/reports')
            .then(res => res.json())
            .then(data => {
                allData = data;
                updateDashboard(data);
            });
    }

    function updateDashboard(data) {

        let total = data.length;
        let pass = data.filter(d => d.status === 'PASS').length;
        let fail = data.filter(d => d.status === 'FAIL').length;

        document.getElementById('total').innerText = total;
        document.getElementById('pass').innerText = pass;
        document.getElementById('fail').innerText = fail;

        loadTable(data);
        loadCharts(pass, fail, data);
    }

    function loadTable(data) {
        let html = "";

        data.forEach(d => {
            html += `
            <tr>
                <td>${d.testName}</td>
                <td class="${d.status === 'PASS' ? 'pass' : 'fail'}">${d.status}</td>
                <td>${d.executionTime}</td>
                <td>
                    ${d.screenshotPath ? `<a href="${d.screenshotPath}" target="_blank">View</a>` : '-'}
                </td>
            </tr>`;
        });

        document.getElementById('tableBody').innerHTML = html;
    }

    function loadCharts(pass, fail, data) {

        if (pieChart) pieChart.destroy();
        if (barChart) barChart.destroy();

        // PIE
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: ['Passed', 'Failed'],
                datasets: [{ data: [pass, fail] }]
            },
            options: { animation: false }
        });

        // GROUP AVG
        let map = {};

        data.forEach(d => {
            if (!map[d.testName]) {
                map[d.testName] = { total: 0, count: 0 };
            }
            map[d.testName].total += d.executionTime;
            map[d.testName].count++;
        });

        let labels = [];
        let values = [];

        for (let key in map) {
            labels.push(key);
            values.push(Math.round(map[key].total / map[key].count));
        }

        // BAR
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Avg Time',
                    data: values
                }]
            },
            options: { animation: false }
        });
    }

    function filterData() {
        let search = document.getElementById('search').value.toLowerCase();

        let filtered = allData.filter(d =>
            d.testName.toLowerCase().includes(search) ||
            d.status.toLowerCase().includes(search)
        );

        loadTable(filtered);
    }

    function filterStatus(status) {
        if (status === 'ALL') loadTable(allData);
        else loadTable(allData.filter(d => d.status === status));
    }

    loadData();
    setInterval(loadData, 5000);

</script>

</body>
</html>
